<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' file: blob: data: ageofscreen-media:; media-src 'self' file: blob: data: ageofscreen-media:; font-src 'self' data:; connect-src 'self';" />
    <title>Trigger</title>
    <style>
        /* Basic reset and ensure transparency */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
            cursor: default;
        }

        #trigger-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            cursor: default;
            transition: opacity 0.12s ease;
            will-change: opacity;
        }

        #trigger-line::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 20px;
            height: 2px;
            transform: translateX(-50%);
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(71, 85, 105, 0.18), rgba(51, 65, 85, 0.62), rgba(71, 85, 105, 0.18));
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.16),
                0 1px 2px rgba(15, 23, 42, 0.14);
            pointer-events: none;
            opacity: 0.72;
        }

        #trigger-line::after {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 8px;
            height: 1px;
            transform: translateX(-50%);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.42);
            pointer-events: none;
            opacity: 0.78;
        }

        #trigger-line:hover::before {
            opacity: 0.86;
        }

        #trigger-line:hover::after {
            opacity: 0.92;
        }
    </style>
</head>

<body>
    <div id="trigger-line"></div>
</body>

</html>
